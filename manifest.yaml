name: "fullstack-omics"
version: "0.2"
description: "Method-agnostic, simulation-only single-cell omics workflow models."

modules:
  - path: "autonomous-scRNAseq"
    assay: "single-cell RNA sequencing"
    stages: ["planning", "simulation", "analysis_handoff"]
    status: "simulation-only; wet-lab parameters require an ignored local validated profile"
  - path: "autonomous-scWGS"
    assay: "single-cell whole-genome sequencing preparation"
    stages: ["planning", "simulation", "analysis_handoff"]
    status: "simulation-only; wet-lab parameters require an ignored local validated profile"

public_safety:
  actionable_wet_lab_parameters: false
  supplier_catalog_data: false
  hardware_execution_profile: false
  simulation_parameters: "unitless synthetic values only"
