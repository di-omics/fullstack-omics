meta:
  workflow: "single-cell whole-genome sequencing"
  public_profile: "simulation_only"
  actionable_wet_lab_parameters_included: false
  notice: >
    This file defines abstract WGS preparation states and unitless synthetic
    signals. It is not a bench protocol and cannot drive physical instruments.

run:
  n_samples: 96
  batch_capacity: 96

simulation:
  seed: 2603
  readiness:
    labels: ["sample_registry", "workflow_graph", "analysis_contract"]
    synthetic_pass_score: 0.72
    synthetic_fail_score: 0.28
    decision_boundary: 0.50
  stages:
    - id: "register_single_cell_inputs"
      output_state: "inputs_registered"
    - id: "model_genome_preparation"
      output_state: "genome_state"
    - id: "model_library_state"
      output_state: "library_state"
    - id: "emit_wgs_handoff"
      output_state: "analysis_ready"
  synthetic_quality:
    center: 0.80
    spread: 0.10
    decision_boundary: 0.50

analysis:
  interface_version: "1"
  inputs: ["sample_manifest", "read_1_fastq", "read_2_fastq"]
  pipeline_directory: "runtime_required"
  execution_profile: "runtime_required"

hardware:
  local_profile: "validated.local.yaml"
  execution_adapter: "runtime_required"
  policy: "deny_without_local_validated_profile"
