# =============================================================================
# reagents.yaml  --  Bill of Materials (kit-based) for single-cell WGS
# =============================================================================
# Sources:
#   [A] ResolveDNA Whole Genome Single-Cell Core Kit, 96-well -- Kit Contents +
#       "Additional Equipment, Materials, and Reagents" (BioSkryb TAS-068.5).
#   [B] NEBNext Ultra II DNA Library Prep Kit for Illumina -- Kit Components +
#       "Required Materials Not Included" (NEB E7645/E7103 manual).
#
# The nice part (per the user): library prep here is a KIT, so procurement is
# mostly "buy the kit." Individual component part numbers are recorded for
# traceability but you order the kit, not the components.
#
# Catalog numbers are transcribed from the vendor guides. Where a guide does not
# state a value (e.g. the ResolveDNA WHOLE-kit ordering number), the field is
# `# TODO: expert value`. RESEARCH USE ONLY.
#
# scale rules used by procurement/bom.py:
#   per_kit    -> one kit per `plate_capacity` (96) samples  = ceil(n/96)
#   per_plate  -> one unit per plate
#   per_sample -> one unit per sample
#   per_run    -> one bulk unit (covers many runs)
#   once       -> one-time purchase (e.g. instrument, custom order)
# =============================================================================

meta:
  currency: "USD"
  note: "Pack sizes / list prices are not in the guides; leave price null, fill from vendor quote."

# -----------------------------------------------------------------------------
# WGA -- ResolveDNA Whole Genome Single-Cell Core Kit (96-well).  src: [A].
# Order the KIT (one part number); components listed under `contains` for traceability.
# -----------------------------------------------------------------------------
wga_kit:
  - name: "ResolveDNA Whole Genome Single-Cell Core Kit, 96-Well Format"
    vendor: "BioSkryb Genomics"
    catalog: "# TODO: expert value"        # whole-kit ordering number not stated in TAS-068.5;
                                           # contact sales@bioskryb.com / see product page. Verify.
    verify: true
    verify_note: "TAS-068.5 lists component part numbers but not a single whole-kit catalog #. Confirm the orderable kit SKU with BioSkryb."
    scale: per_kit
    note: "One kit = 96 reactions; includes 96 UDI adapters. src: [A] Product Description."
    contains:                              # src: [A] Kit Contents table (part #, cap color)
      - {name: "L1 Reagent", part: "100628", cap: "purple"}
      - {name: "L2 Reagent", part: "100581", cap: "yellow"}
      - {name: "L3 Reagent", part: "100523", cap: "white"}
      - {name: "R1 Reagent", part: "100521", cap: "blue"}
      - {name: "R2 Reagent", part: "100527", cap: "red"}
      - {name: "Control Genomic DNA (50 ng/uL)", part: "101155", cap: "gold"}
      - {name: "Cell Buffer", part: "100574", cap: "clear"}
      - {name: "Single Use Library Adapter Set (96 UDI)", part: "100940 (or 100941-100947)", cap: "plate"}
      - {name: "Resolve Beads", part: "100735", cap: "bottle"}
      - {name: "Elution Buffer", part: "100736", cap: "bottle"}
      # NOTE: the kit also ships BioSkryb Universal Library Prep reagents (LP0B 100833,
      # LP0E 100791, LP1B 100677, LP1E 100680, LP2L 100683, LP3A 100686, LP3P 100689).
      # This workflow uses NEBNext for library prep instead, so those go UNUSED here.

# -----------------------------------------------------------------------------
# Library prep -- NEBNext Ultra II DNA Library Prep Kit.  src: [B].
# Use E7103 (includes Sample Purification Beads) OR E7645 (no beads; buy SPRIselect).
# -----------------------------------------------------------------------------
libprep_kit:
  - name: "NEBNext Ultra II DNA Library Prep Kit for Illumina (96 rxn, WITH beads)"
    vendor: "New England Biolabs"
    catalog: "E7103L"                      # src: [B] "#E7103L ... 96 reactions" (incl. beads)
    scale: per_kit
    note: "96-rxn kit. E7103 includes NEBNext Sample Purification Beads. src: [B] Kit Components."
  - name: "NEBNext Ultra II DNA Library Prep Kit for Illumina (96 rxn, NO beads)"
    vendor: "New England Biolabs"
    catalog: "E7645L"                      # src: [B] "#E7645L ... 96 reactions"
    optional: true
    note: "Alternative to E7103L; if used, also buy SPRIselect/AMPure below. src: [B]."
    scale: per_kit
  - name: "NEBNext Multiplex Oligos for Illumina (Unique Dual Index UMI Adaptors DNA)"
    vendor: "New England Biolabs"
    catalog: "# TODO: expert value"        # src: [B] "must be purchased separately ... www.neb.com/oligos"
    verify: true
    verify_note: "NEBNext UMI adaptor oligo SKU depends on plex/set (see neb.com/oligos). Required by [B] 2.2. Pick the set matching your plate count."
    scale: per_kit
    note: "The UMI adaptors used in [B] End Prep/Ligation. NOT the ResolveDNA adapters."
  - name: "SPRIselect Reagent Kit"
    vendor: "Beckman Coulter"
    catalog: "B23317"                      # src: [B] Required Materials (for E7645 only)
    optional: true
    note: "Only needed with E7645 (E7103 already includes beads). src: [B]. AMPure XP A63881 also works."
    scale: per_run
  - name: "NEBNext Library Quant Kit for Illumina (qPCR, optional)"
    vendor: "New England Biolabs"
    catalog: "E7630"                       # src: [B] 3A.14/3B.11 (PCR-free quant recommendation)
    optional: true
    scale: per_run

# -----------------------------------------------------------------------------
# Sample & library QC.  src: [A] Additional Equipment + Post-QC; [B] 5.12.
# -----------------------------------------------------------------------------
qc_reagents:
  - name: "Qubit 1X dsDNA High Sensitivity Assay Kit"
    vendor: "Thermo Fisher Scientific"
    catalog: "Q32854"                      # src: [A] Additional Equipment ("High Sensitivity dsDNA Assay kit ... Q32854")
    scale: per_plate
    note: "dsDNA quant for WGA product + libraries. Read on Qubit or Synergy H1 (std curve)."
  - name: "Agilent HS D5000 ScreenTape"
    vendor: "Agilent"
    catalog: "5067-5592"                   # src: [A] Additional Equipment
    scale: per_plate
    note: "WGA-product fragment sizing (avg ~1275 bp). src: [A] QC step 4."
  - name: "Agilent HS D5000 Reagents"
    vendor: "Agilent"
    catalog: "5067-5593"                   # src: [A] Additional Equipment
    scale: per_plate
  - name: "Agilent HS D1000 ScreenTape (final library sizing)"
    vendor: "Agilent"
    catalog: "# TODO: expert value"        # src: [A] post-lib QC 3 names "HS D1000" but no cat # given
    verify: true
    verify_note: "[A] post-library QC uses 'HS D1000 ScreenTape' but gives no catalog #. Look up current Agilent SKU."
    scale: per_plate

# -----------------------------------------------------------------------------
# Instrument-readiness QC (Rhodamine B liquid-handling check). NOT part of either
# protocol -- added by this skill for Stage 0 instrument readiness. Read on Synergy H1.
# -----------------------------------------------------------------------------
readiness_reagents:
  - name: "Rhodamine B"
    vendor: "Merck MilliporeSigma (Sigma-Aldrich)"
    catalog: "83689"
    verify: true
    verify_note: "Not in either protocol (added by this skill). Confirm SKU/grade -- e.g. Sigma 83689 (Rhodamine B for fluorescence) or R6626."
    note: "Working solution ~10 uM; tune conc + H1 gain so signal is in-range. See config/readiness.yaml."
    scale: per_run
  - name: "Black 96-well microplate (for fluorescence read)"
    vendor: "Thermo Fisher Scientific"
    catalog: "237105"                      # Nunc F96 black (shared readiness + dsDNA reads)
    verify: true
    verify_note: "Confirm a black flat-bottom 96-well plate suitable for top fluorescence on your H1."
    scale: per_plate

# -----------------------------------------------------------------------------
# BioSkryb accessory hardware / consumables.  src: [A] "Products from BioSkryb".
# -----------------------------------------------------------------------------
bioskryb_accessories:
  - {name: "ResolveDNA PTA-Grade Cell Buffer Pack (12x 500 uL)", vendor: "BioSkryb", catalog: "100177", scale: per_run, optional: true}
  - {name: "ResolveDNA Elution Buffer pH 8.5 (12x 500 uL)",      vendor: "BioSkryb", catalog: "100178", scale: per_run, optional: true}
  - {name: "Low Bind 96-Well PCR Plates",                        vendor: "BioSkryb", catalog: "100149", scale: per_plate}
  - {name: "ResolveDNA Magnetic Plate",                          vendor: "BioSkryb", catalog: "100135", scale: once}

# -----------------------------------------------------------------------------
# General consumables (third-party).  src: [A] "Products from Third-Party Suppliers".
# -----------------------------------------------------------------------------
consumables:
  - {name: "PCR Plate Sealing Film",         vendor: "Thermo Fisher", catalog: "AB-0558",     scale: per_plate}   # src: [A]
  - {name: "twin.tec 96-well PCR Plate",     vendor: "Eppendorf",     catalog: "0030128648",  scale: per_plate}   # src: [A]
  - {name: "8-strip 0.2 mL PCR Tubes",       vendor: "General Lab Supplier", catalog: "# TODO: expert value", scale: per_run}  # src: [A] (GLS, no cat #)
  - {name: "1.5 mL Microcentrifuge Tubes (DNA LoBind)", vendor: "General Lab Supplier", catalog: "# TODO: expert value", scale: per_run}  # src: [A]
  - {name: "Aerosol barrier tips (P10/P20/P200/P1000)", vendor: "Rainin or GLS", catalog: "# TODO: expert value", scale: per_run}  # src: [A]
  - {name: "Absolute (200 proof) Ethanol",   vendor: "General Lab Supplier", catalog: "# TODO: expert value", scale: per_run}  # src: [A] (80% EtOH washes)
  - {name: "RT-PCR Grade / nuclease-free Water", vendor: "General Lab Supplier", catalog: "# TODO: expert value", scale: per_run}  # src: [A]
  - {name: "1X TE / 0.1X TE (10 mM Tris-HCl pH 8.0, 0.1 mM EDTA)", vendor: "General Lab Supplier", catalog: "# TODO: expert value", scale: per_run}  # src: [B] Required Materials

# -----------------------------------------------------------------------------
# Sorter up front -- BD FACS Melody (FACS/FANS).  src: [A] I/II (FACS/FANS).
# Control-plane RE is on the user's TODO; consumables here are best-effort and
# flagged -- confirm against the BD FACS Melody user guide before ordering.
# -----------------------------------------------------------------------------
sorter_consumables:
  - name: "BD FACSMelody sheath fluid / FACSFlow"
    vendor: "BD Biosciences"
    catalog: "# TODO: expert value"
    verify: true
    verify_note: "Sorter consumable, not in the ResolveDNA/NEB guides. Confirm from the BD FACS Melody user guide."
    scale: per_run
