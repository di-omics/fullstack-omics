meta:
  workflow: "single-cell RNA sequencing"
  public_profile: "simulation_only"
  actionable_wet_lab_parameters_included: false
  notice: >
    This file defines abstract workflow states and unitless synthetic signals. It
    is not a bench protocol and cannot be translated into physical instructions.

run:
  n_samples: 96
  batch_capacity: 96

simulation:
  seed: 1701
  readiness:
    labels: ["input_registration", "workflow_graph", "analysis_contract"]
    synthetic_pass_score: 0.70
    synthetic_fail_score: 0.30
    decision_boundary: 0.50
  stages:
    - id: "register_single_cell_inputs"
      output_state: "inputs_registered"
    - id: "model_transcript_capture"
      output_state: "transcript_state"
    - id: "model_cdna_state"
      output_state: "cdna_state"
    - id: "model_library_state"
      output_state: "library_state"
    - id: "emit_analysis_handoff"
      output_state: "analysis_ready"
  synthetic_quality:
    center: 0.78
    spread: 0.12
    decision_boundary: 0.50

analysis:
  interface_version: "1"
  inputs: ["read_1_fastq", "read_2_fastq", "reference_index", "gene_annotation"]
  tool_parameters: "runtime_required"

hardware:
  local_profile: "validated.local.yaml"
  execution_adapter: "runtime_required"
  policy: "deny_without_local_validated_profile"
