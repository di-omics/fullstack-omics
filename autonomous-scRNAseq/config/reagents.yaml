  - name: "UltraPure DNase/RNase-Free Distilled Water"
    vendor: "Invitrogen (Thermo Fisher)"
    catalog: "10977-049"
    scale: per_run
  - name: "Safe-Lock Tubes 1.5 mL, PCR clean, DNA LoBind"
    vendor: "Eppendorf"
    catalog: "0030108051"
    scale: per_sample
  - name: "Ethanol (molecular biology grade, >=99.8%)"
    vendor: "Merck MilliporeSigma (Sigma-Aldrich)"
    catalog: "51976-500ML-F"
    scale: per_run

# -----------------------------------------------------------------------------
# Custom oligonucleotides (IDT-orderable).  src: Materials -- "OLIGONUCLEOTIDES"
# All carry 5'-biotin (/5Biosg/) and a phosphorothioate bond (*) between the last
# two nucleotides; ordered desalted (HPLC optional). rG = riboguanosine.
#
# SAFETY: The RT-PCR oligo sequences below are transcribed from an OCR'd table and
# are marked verify: true. The 48 i7 + 32 i5 enrichment adaptor sequences are NOT
# transcribed (OCR unreliable across 80 rows) -- copy them from the DOI. This is
# the `# TODO: expert value` case from the build spec: do not order from garbled
# sequence. Order the Nextera XT Index Kit v2 sets above unless you need >96-plex.
# -----------------------------------------------------------------------------
oligos_rt_pcr:
  - name: "STRT-P1-T31"
    vendor: "IDT (custom synthesis)"
    catalog: "custom"
    scale: once
    sequence_5to3: "/5Biosg/AATGATACGGCGACCACCGTTTTTTTTTTTTTTTTTTTTTTTTATCGTTTTTTTT"
    modifications: "5'-biotin (/5Biosg/); phosphorothioate at 3' terminus; desalted"
    note: "oligo-dT that does NOT end with 'VN' (unlike standard SMART-seq oligo-dT)."
    used_in: "lysis_mix"
    working_conc_uM: 100
    verify: true
    verify_note: "Sequence transcribed from OCR table -- verify exact length of poly-T against DOI."
  - name: "TSO-UMI"
    vendor: "IDT (custom synthesis)"
    catalog: "custom"
    scale: once
    sequence_5to3: "/5Biosg/AAGCANNNNNNNNCTAACrGrGrG"
    modifications: "5'-biotin; rGrGrG (riboG); 8 nt UMI (N8); desalted"
    note: >
      OCR of this row was unreliable. Structure is constrained by the umi_tools
      regex in Stage 12: ...AAGCAGTGGTATCAACGCAGAGT | (UMI x8) | CTAACGG. Treat the
      sequence here as a placeholder.
    used_in: "rt_pcr_mix"
    working_conc_uM: 100
    verify: true
    verify_note: "TODO: expert value -- copy exact TSO-UMI sequence from the DOI before ordering."
  - name: "Tn5-ISPCR-F"
    vendor: "IDT (custom synthesis)"
    catalog: "custom"
    scale: once
    sequence_5to3: "TCGTCGGCAGCGTCAGTGGTATCAACGCAGAGT"
    modifications: "phosphorothioate at 3' terminus; desalted (no 5'-biotin on this one per table)"
    used_in: "rt_pcr_mix"
    working_conc_uM: 100
    verify: true
    verify_note: "OCR-garbled tail; verify full sequence against DOI."
  - name: "DI-PCR-P1A-R"
    vendor: "IDT (custom synthesis)"
    catalog: "custom"
    scale: once
    sequence_5to3: "AATGATACGGCGACCACCGA"
    modifications: "phosphorothioate at 3' terminus; desalted"
    used_in: "rt_pcr_mix"
    working_conc_uM: 100
    verify: true
    verify_note: "OCR-garbled; verify full sequence against DOI."

# NOTE ON INDEX OLIGOS (standard library prep):
# For a STANDARD run (<=96-plex) you do NOT order custom index oligos. The Nextera
# XT Index Kit v2 (FC-131-2001..2004, listed under tagmentation_reagents) already
# supplies the bog-standard i7 (N7xx) + i5 (S5xx) adaptors -- that's all the index
# oligos you need. The only genuinely CUSTOM, IDT-ordered oligos are the 4 RT-PCR
# oligos above (STRT-P1-T31, TSO-UMI, Tn5-ISPCR-F, DI-PCR-P1A-R). The extra set
# below is OPTIONAL and only needed to multiplex beyond the kit's 96 combinations.
oligos_enrichment_extra:
  optional_for_higher_plex_only: true
  description: >
    OPTIONAL extra non-UDI index set for >96-plex ONLY (standard prep uses the
    Nextera XT Index Kit v2 above): 48 x Nextera_extra_i7 (N7xx) + 32 x
    Nextera_extra_i5 (S5xx). All 5'-biotin + terminal phosphorothioate, desalted.
    Prepare working dilution plates of unique N7xx+S5xx combos at 5 uM each
    (src: Stage 9 index adaptor conc).
  i7_count: 48
  i5_count: 32
  working_conc_uM: 5
  sequences: null
  verify: true
  verify_note: "TODO: expert value -- 80 sequences omitted (OCR unreliable). Only needed for >96-plex; copy sequences from the DOI oligo tables before ordering."
